name: Deploy to Lightsail

on:
  push:
    branches: [ main ]
    # 아래 설정이 추가되면 해당 폴더 파일이 변할 때만 이 액션이 감지합니다.
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  # 1. 변경된 사항이 있는지 체크하는 Job
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # 2. 빌드 및 푸시 (병렬 실행 가능)
  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 백엔드가 변경되었을 때만 실행
      - name: Build and Push Backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back

      # 프론트엔드가 변경되었을 때만 실행
      - name: Build and Push Frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front

  # 3. 배포 (변경된 것만 새로 올림)
  deploy:
    needs: [changes, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Lightsail and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # 백엔드 변경 시에만 재배포
            if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back
              docker stop backend || true
              docker rm backend || true
              docker run -d --name backend -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back
            fi

            # 프론트엔드 변경 시에만 재배포
            if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front
              docker stop frontend || true
              docker rm frontend || true
              docker run -d --name frontend -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front
            fi
            
            docker image prune -f
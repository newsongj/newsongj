name: Deploy to Lightsail

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────
  # 1. 어떤 폴더가 변경됐는지 감지
  # ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────
  # 2. 변경된 서비스만 Docker 이미지 빌드 → Docker Hub 푸시
  # ──────────────────────────────────────────
  build-and-push:
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back

      - name: Build and Push Frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front

  # ──────────────────────────────────────────
  # 3. 서버 배포
  # ──────────────────────────────────────────
  deploy:
    needs: [changes, build-and-push]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 30m
          script: |
            mkdir -p ~/newsongj

            if ! command -v docker-compose &> /dev/null; then
              sudo curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            cat > ~/newsongj/.env << EOF
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=mariadb
            DB_NAME=newsongj
            EOF

            cat > ~/newsongj/docker-compose.yml << 'COMPOSEOF'
            services:
              mariadb:
                image: mariadb:10.11
                environment:
                  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
                  MYSQL_DATABASE: newsongj
                  MYSQL_USER: ${DB_USER}
                  MYSQL_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - db_data:/var/lib/mysql
                ports:
                  - "3307:3306"
                healthcheck:
                  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                  interval: 5s
                  timeout: 5s
                  retries: 10

              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                depends_on:
                  mariadb:
                    condition: service_healthy

              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front
                ports:
                  - "80:80"

            volumes:
              db_data:
            COMPOSEOF

            docker stop backend frontend || true
            docker rm backend frontend || true

            cd ~/newsongj
            docker-compose pull
            docker-compose up -d

            docker-compose exec -T backend sh -c "until alembic upgrade head; do echo 'Waiting for DB...'; sleep 3; done"

            docker image prune -f

name: Deploy to Lightsail

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'           # docker-compose ліҖкІҪлҸ„ л°°нҸ¬ нҠёлҰ¬кұ°
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # 1. м–ҙл–Ө нҸҙлҚ”к°Җ ліҖкІҪлҗҗлҠ”м§Җ к°җм§Җ
  #    backend / frontend к°Ғк°Ғ true/false м¶ңл Ҙ
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # 2. backend ліҖкІҪ мӢң pytest мӢӨн–ү
  #    ліҖкІҪ м—Ҷмңјл©ҙ мқҙ job мһҗмІҙлҘј мҠӨнӮө
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'       # Dockerfileкіј лІ„м „ нҶөмқј (кё°мЎҙ 3.10мқҖ мҳӨнғҖ)
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest
      - name: Run tests
        run: cd backend && pytest || echo "No tests found"

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # 3. frontend ліҖкІҪ мӢң л№Ңл“ң м„ұкіө м—¬л¶Җ нҷ•мқё
  #    ліҖкІҪ м—Ҷмңјл©ҙ мқҙ job мһҗмІҙлҘј мҠӨнӮө
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - run: cd frontend && npm install && npm run build

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # 4. ліҖкІҪлҗң м„ңл№„мҠӨл§Ң Docker мқҙлҜём§Җ л№Ңл“ң вҶ’ Docker Hub н‘ёмӢң
  #    н…ҢмҠӨнҠёк°Җ мӢӨнҢЁн•ҳм§Җ м•ҠмқҖ кІҪмҡ°(м„ұкіө or мҠӨнӮө)м—җл§Ң мӢӨн–ү
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  build-and-push:
    needs: [changes, test-backend, test-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back

      - name: Build and Push Frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # 5. м„ңлІ„ л°°нҸ¬
  #
  #    кё°мЎҙ л°©мӢқ (м ңкұ°):
  #      docker runмңјлЎң м»Ён…Ңмқҙл„ҲлҘј н•ҳлӮҳм”© мҲҳлҸҷ мӢӨн–ү
  #      вҶ’ MariaDBлҘј л”°лЎң лқ„мӣҢм•ј н•ҳкі , .env м „лӢ¬лҸ„ м—Ҷм—ҲмқҢ
  #
  #    ліҖкІҪ л°©мӢқ:
  #      м„ңлІ„м—җ docker-compose.yml + .env лҘј л§Ңл“Өкі 
  #      docker-compose up -d н•ң лІҲмңјлЎң м „мІҙ мҠӨнғқ мӢӨн–ү
  #      вҶ’ лЎңм»¬мқҙлһ‘ мҷ„м „нһҲ лҸҷмқјн•ң нҷҳкІҪ
  #
  #    н•„мҡ”н•ң GitHub Secrets (кё°мЎҙ н•ӯлӘ© + мӢ к·ң 3к°ң):
  #      кё°мЎҙ: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, LIGHTSAIL_IP, LIGHTSAIL_SSH_KEY
  #      мӢ к·ң: DB_ROOT_PASSWORD, DB_USER, DB_PASSWORD
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy:
    needs: [changes, build-and-push]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # мһ‘м—… л””л үнҶ лҰ¬ мғқм„ұ
            mkdir -p ~/newsongj

            # docker-compose м„Өм№ҳ нҷ•мқё (Amazon LinuxлҠ” кё°ліё лҜём„Өм№ҳ)
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # .env нҢҢмқј мғқм„ұ - DB м ‘мҶҚ м •ліҙлҘј GitHub Secretsм—җм„ң мЈјмһ…
            cat > ~/newsongj/.env << EOF
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=mariadb
            DB_NAME=newsongj
            EOF

            # docker-compose.yml мғқм„ұ
            # лЎңм»¬кіј лӢӨлҘё м җ: build лҢҖмӢ  Docker Hub мқҙлҜём§ҖлҘј м§Ғм ‘ мӮ¬мҡ©
            # лЎңм»¬м—җм„ңлҠ” мҶҢмҠӨлҘј л№Ңл“ңн•ҙм„ң м“°кі , м„ңлІ„м—җм„ңлҠ” мқҙлҜё л№Ңл“ңлҗң мқҙлҜём§ҖлҘј pullн•ҙм„ң м”Җ
            cat > ~/newsongj/docker-compose.yml << 'COMPOSEOF'
            services:
              mariadb:
                image: mariadb:10.11
                environment:
                  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
                  MYSQL_DATABASE: newsongj
                  MYSQL_USER: ${DB_USER}
                  MYSQL_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - db_data:/var/lib/mysql
                ports:
                  - "3307:3306"          # мҷёл¶Җ(DBeaver л“ұ)м—җм„ң м ‘мҶҚ мӢң 3307 мӮ¬мҡ©
                healthcheck:
                  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                  interval: 5s
                  timeout: 5s
                  retries: 10

              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                depends_on:
                  mariadb:
                    condition: service_healthy

              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front
                ports:
                  - "80:80"

            volumes:
              db_data:
            COMPOSEOF

            # кё°мЎҙм—җ docker runмңјлЎң лқ„мҡҙ м»Ён…Ңмқҙл„Ҳк°Җ мһҲлӢӨл©ҙ нҸ¬нҠё м¶©лҸҢ л°©м§ҖлҘј мң„н•ҙ м ңкұ°
            docker stop backend frontend || true
            docker rm backend frontend || true

            # мөңмӢ  мқҙлҜём§Җ pull нӣ„ м „мІҙ мҠӨнғқ мһ¬мӢңмһ‘
            cd ~/newsongj
            docker-compose pull
            docker-compose up -d

            # мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ” мқҙм „ мқҙлҜём§Җ м •лҰ¬
            docker image prune -f

name: Deploy to Lightsail

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: 

jobs:
  # 1. 변경된 사항 체크
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # 2. 백엔드 검증
  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pytest httpx
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: Run Pytest
        run: |
          cd backend
          pytest || echo "No tests found"

  # 3. 프론트엔드 검증
  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Build check
        run: |
          cd frontend
          npm run build

  # 4. 빌드 및 푸시
  build-and-push:
    needs: [changes, test-backend, test-frontend]
    # 테스트가 실패하지만 않았다면(성공 또는 스킵) 실행
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back

      - name: Build and Push Frontend
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front

  # 5. 배포 (핵심 수정 부분)
  deploy:
    needs: [changes, build-and-push]
    # build-and-push가 성공했거나, '변경사항 없음'으로 스킵되었더라도 실패만 아니면 실행
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Lightsail and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # 변경사항이 있을 때만 도커 명령 실행
            if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back
              docker stop backend || true
              docker rm backend || true
              docker run -d --name backend -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-back
            fi

            if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front
              docker stop frontend || true
              docker rm frontend || true
              docker run -d --name frontend -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/newsongj-front
            fi
            docker image prune -f
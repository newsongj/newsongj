name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'

jobs:

  # ──────────────────────────────────────────
  # 어떤 폴더가 변경됐는지 감지
  # ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────
  # backend 변경 시 pytest 실행
  # ──────────────────────────────────────────
  test-backend:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        if: needs.changes.outputs.backend == 'true'
      - uses: actions/setup-python@v4
        if: needs.changes.outputs.backend == 'true'
        with:
          python-version: '3.11'
      - name: Install dependencies
        if: needs.changes.outputs.backend == 'true'
        run: pip install -r backend/requirements.txt pytest
      - name: Run tests
        if: needs.changes.outputs.backend == 'true'
        run: cd backend && pytest || echo "No tests found"

  # ──────────────────────────────────────────
  # frontend 변경 시 빌드 성공 여부 확인
  # ──────────────────────────────────────────
  test-frontend:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        if: needs.changes.outputs.frontend == 'true'
      - uses: actions/setup-node@v3
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: '22'
      - name: Build
        if: needs.changes.outputs.frontend == 'true'
        run: cd frontend && npm install && npm run build

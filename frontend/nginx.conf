server {
    listen 80;

    # 관리자 페이지
    location /admin {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location /api {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
    }

    # 사용자 페이지 (client-frontend 컨테이너로 프록시)
    location /vehicle {
        proxy_pass http://client-frontend:80;
        proxy_set_header Host $host;
    }

    location /research {
        proxy_pass http://client-frontend:80;
        proxy_set_header Host $host;
    }

    location /login {
        proxy_pass http://client-frontend:80;
        proxy_set_header Host $host;
    }

    # client-frontend 정적 자산 (index.html이 참조하는 /assets/*)
    location /assets {
        proxy_pass http://client-frontend:80;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    # 루트 접속 시 관리자 페이지로 리다이렉트
    location = / {
        return 301 /admin/;
    }

    # 관리자 페이지
    location /admin {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location /api {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
    }

    # 사용자 페이지 (client-frontend 컨테이너로 프록시)
    location /vehicle {
        set $client http://client-frontend:80;
        proxy_pass $client;
        proxy_set_header Host $host;
    }

    location /research {
        set $client http://client-frontend:80;
        proxy_pass $client;
        proxy_set_header Host $host;
    }

    location /login {
        set $client http://client-frontend:80;
        proxy_pass $client;
        proxy_set_header Host $host;
    }
}
